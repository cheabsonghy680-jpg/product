<!-- ===== CART ===== -->
<div id="cart" style="display:none;" class="container mt-5">
<h2 class="text-center text-danger">Shopping Cart</h2>

<table class="table">
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
<th></th>
</tr>
</thead>
<tbody id="cart-items"></tbody>
</table>

<h4>Total: $<span id="total-price">0</span></h4>

<button class="btn btn-secondary" onclick="showProducts()">Back</button>

<script src="./assets/js/bootstrap.bundle.min.js"></script>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price){
    let item = cart.find(p => p.name === name);
    if(item){ item.qty++; }
    else{ cart.push({name, price, qty:1}); }
    saveCart();
}

function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCart();
}

function updateCart(){
    let cartItems = document.getElementById("cart-items");
    let total = 0, count = 0;
    cartItems.innerHTML = "";

    cart.forEach((item, i) => {
        cartItems.innerHTML += `
        <tr>
            <td>${item.name}</td>
            <td>$${item.price}</td>
            <td>
                <button onclick="decrease(${i})">-</button>
                ${item.qty}
                <button onclick="increase(${i})">+</button>
            </td>
            <td>$${item.price * item.qty}</td>
            <td><button onclick="removeItem(${i})">X</button></td>
        </tr>`;
        total += item.price * item.qty;
        count += item.qty;
    });

    document.getElementById("total-price").innerText = total;
    document.getElementById("cart-count").innerText = count;
}

function increase(i){ cart[i].qty++; saveCart(); }

function decrease(i){
    if(cart[i].qty > 1){ cart[i].qty--; }
    else{ cart.splice(i,1); }
    saveCart();
}

function removeItem(i){
    cart.splice(i,1);
    saveCart();
}

function showCart(){
    document.querySelector(".content").style.display="none";
    document.getElementById("cart").style.display="block";
}

function showProducts(){
    document.querySelector(".content").style.display="block";
    document.getElementById("cart").style.display="none";
}

updateCart();
</script>
